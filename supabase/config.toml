[api]
enabled = true
port = 54321

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:19006"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.sms]
enable_signup = true
enable_confirmations = true

[auth.sms.twilio]
enabled = true
account_sid = "env(TWILIO_ACCOUNT_SID)"
auth_token = "env(TWILIO_AUTH_TOKEN)"
message_service_sid = "env(TWILIO_MESSAGE_SERVICE_SID)"

[realtime]
enabled = true

[functions.generate-report]
verify_jwt = false

[functions.admin-users]
verify_jwt = true

[functions.admin-orgs]
verify_jwt = true

[functions.admin-reports]
verify_jwt = true

[functions.admin-analytics]
verify_jwt = true

[functions.admin-audit]
verify_jwt = true

[functions.generate-report-playground]
verify_jwt = false
