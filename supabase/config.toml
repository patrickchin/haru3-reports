[api]
enabled = true
port = 54321

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:19006"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

# SOC 2 CC6.1 — rate limits on auth endpoints to slow brute-force OTP
# guessing and SMS bombing. Hosted Supabase enforces these via the
# `[auth.rate_limit]` block (matched by the dashboard config).
[auth.rate_limit]
# OTP/sign-in requests per hour, per IP.
sms_sent = 30
# OTP verification attempts per 5 minutes, per IP.
verify = 30
# Token refresh attempts per 5 minutes, per session.
token_refresh = 150
# Anonymous sign-ins per hour, per IP (we don't use anon, keep low).
anonymous_users = 10

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.sms]
enable_signup = true
enable_confirmations = true

[auth.sms.twilio]
enabled = true
account_sid = "env(TWILIO_ACCOUNT_SID)"
auth_token = "env(TWILIO_AUTH_TOKEN)"
message_service_sid = "env(TWILIO_MESSAGE_SERVICE_SID)"

# Fixed OTP codes for local E2E tests (bypasses Twilio entirely for these numbers).
[auth.sms.test_otp]
"+15551234567" = "888888"
"+15559876543" = "888888"
"+15550000003" = "888888"
"+15559999999" = "888888"

[realtime]
enabled = true

[functions.generate-report]
verify_jwt = false

[functions.admin-login]
verify_jwt = false

[functions.admin-bootstrap]
verify_jwt = false

[functions.admin-users]
verify_jwt = false

[functions.admin-orgs]
verify_jwt = false

[functions.admin-sites]
verify_jwt = false

[functions.admin-reports]
verify_jwt = false

[functions.admin-analytics]
verify_jwt = false

[functions.admin-activity]
verify_jwt = false

[functions.admin-audit]
verify_jwt = false

[functions.generate-report-playground]
verify_jwt = false
