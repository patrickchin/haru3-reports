name: RLS Integration Tests

# Two flavours:
#   - local:  every PR + push to main/dev. Runs against an ephemeral
#             `supabase start` stack so the suite is isolated, deterministic,
#             and exercises the migrations themselves.
#   - hosted: nightly + manual dispatch. Runs the same suite against the
#             linked Supabase dev project to catch drift between migrations
#             and what is actually deployed.
#
# See supabase/tests/README.md.

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Where to run the suite"
        type: choice
        default: local
        options: [local, hosted, both]
  push:
    branches: [main, dev]
    paths:
      - "supabase/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/rls-tests.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "supabase/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/rls-tests.yml"
  schedule:
    - cron: "0 19 * * *" # Nightly 19:00 UTC — hosted run only

permissions:
  contents: read

concurrency:
  group: rls-tests-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  local:
    name: RLS (local supabase)
    if: github.event_name != 'schedule' && github.event.inputs.target != 'hosted'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: supabase start
        run: supabase start

      - name: Capture local URL + anon key
        run: |
          eval "$(supabase status -o env | grep -E '^(API_URL|ANON_KEY)=')"
          {
            echo "SUPABASE_URL=${API_URL}"
            echo "SUPABASE_ANON_KEY=${ANON_KEY}"
          } >> "$GITHUB_ENV"

      - name: Run RLS tests
        run: pnpm test:rls:hosted

      - name: supabase stop
        if: always()
        run: supabase stop --no-backup || true

  hosted:
    name: RLS (hosted dev)
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.target == 'hosted' || github.event.inputs.target == 'both'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: development
    concurrency:
      group: rls-tests-hosted
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run RLS tests against hosted dev
        env:
          SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Missing EXPO_PUBLIC_SUPABASE_URL / EXPO_PUBLIC_SUPABASE_ANON_KEY secrets." >&2
            exit 1
          fi
          pnpm test:rls:hosted

      - name: Assert storage buckets exist with expected config
        # Guards against the file-upload migration (`202604270001_file_upload_storage`)
        # being missing or partially applied on the hosted project. Calls the
        # public Storage REST API with the anon key — buckets are listed by
        # any authenticated/anonymous client. We assert:
        #   - `project-files` exists, is private, 50 MiB limit
        #   - `avatars`       exists, is public,  10 MiB limit, image/* only
        env:
          SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          curl_get() {
            curl -fsS \
              -H "apikey: $SUPABASE_ANON_KEY" \
              -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
              "$1"
          }
          buckets="$(curl_get "$SUPABASE_URL/storage/v1/bucket")"
          echo "$buckets" | jq -e '.[] | select(.id=="project-files") | select(.public==false) | select(.file_size_limit==52428800)' \
            > /dev/null \
            || { echo "::error::project-files bucket missing or misconfigured"; echo "$buckets" | jq '.[] | select(.id=="project-files")'; exit 1; }
          echo "$buckets" | jq -e '.[] | select(.id=="avatars") | select(.public==true) | select(.file_size_limit==10485760) | select(.allowed_mime_types | index("image/jpeg"))' \
            > /dev/null \
            || { echo "::error::avatars bucket missing or misconfigured"; echo "$buckets" | jq '.[] | select(.id=="avatars")'; exit 1; }
          echo "Storage buckets verified."
