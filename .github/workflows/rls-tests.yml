name: RLS Integration Tests

# Hits the linked Supabase dev project. Run manually before merging
# migrations or RLS-policy changes, and nightly as a regression guard.
# See supabase/tests/README.md.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 19 * * *" # Nightly 19:00 UTC

permissions:
  contents: read

concurrency:
  group: rls-tests
  cancel-in-progress: false

jobs:
  rls:
    name: RLS Tests (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: development

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create mobile env
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$EXPO_PUBLIC_SUPABASE_URL" ] || [ -z "$EXPO_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "Missing required secrets EXPO_PUBLIC_SUPABASE_URL / EXPO_PUBLIC_SUPABASE_ANON_KEY." >&2
            exit 1
          fi
          {
            printf 'EXPO_PUBLIC_SUPABASE_URL=%s\n' "$EXPO_PUBLIC_SUPABASE_URL"
            printf 'EXPO_PUBLIC_SUPABASE_ANON_KEY=%s\n' "$EXPO_PUBLIC_SUPABASE_ANON_KEY"
          } > .env.local

      - name: Run RLS tests
        run: pnpm --filter mobile exec vitest run ../../supabase/tests
