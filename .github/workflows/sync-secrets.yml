name: Sync Secrets (Doppler → Supabase/Vercel/EAS)

# Manual trigger only. Pulls from a Doppler config (source of truth) and
# pushes to Supabase, Vercel, and EAS. See docs/secrets-management.md.

on:
  workflow_dispatch:
    inputs:
      config:
        description: "Doppler config to sync"
        required: true
        type: choice
        options: [dev, stg, prd]

concurrency:
  group: sync-secrets-${{ inputs.config }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    # Map Doppler configs to GitHub Environments so prod requires approval.
    environment: >-
      ${{ inputs.config == 'prd' && 'production'
       || inputs.config == 'stg' && 'staging'
       || 'development' }}
    env:
      # Service token scoped to the chosen Doppler config.
      DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
      # Required by Vercel + EAS CLIs.
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      # Supabase CLI auth.
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install Vercel + EAS CLIs
        run: npm i -g vercel@latest eas-cli@latest

      - name: Run sync script
        run: bash scripts/sync-secrets.sh "${{ inputs.config }}"
