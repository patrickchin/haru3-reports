name: Sync Secrets (Doppler → Supabase/Vercel/EAS)

# Manual trigger only. Pulls from a Doppler config (source of truth) and
# pushes to Supabase, Vercel, and EAS. See docs/secrets-management.md.

on:
  workflow_dispatch:
    inputs:
      config:
        description: "Doppler config to sync"
        required: true
        type: choice
        options: [development, staging, production]

concurrency:
  group: sync-secrets-${{ inputs.config }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    # Doppler config name == GitHub Environment name.
    environment: ${{ inputs.config }}
    env:
      # Service token scoped to the chosen Doppler config.
      DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
      # Required by EAS CLI.
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      # Supabase CLI auth.
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install EAS CLI
        run: npm i -g eas-cli@latest

      - name: Run sync script
        run: bash scripts/sync-secrets.sh "${{ inputs.config }}"
