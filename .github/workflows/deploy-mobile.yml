name: Deploy Mobile (DISABLED)

# DISABLED — deploy workflows are paused
on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform"
        required: true
        type: choice
        options:
          - all
          - ios
          - android
      profile:
        description: "EAS build profile"
        required: true
        type: choice
        options:
          - development
          - preview
          - production
      submit:
        description: "Submit to app stores after build"
        required: false
        type: boolean
        default: false
  # push:
  #   branches: [main, dev]
  #   paths:
  #     - "apps/mobile/**"

permissions:
  contents: read

env:
  WORKING_DIR: apps/mobile

jobs:
  # OTA update on push (fast — no native build)
  ota-update:
    if: false # DISABLED
    name: OTA Update (${{ github.ref_name == 'main' && 'preview' || 'development' }})
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'staging' || 'development' }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish OTA update
        working-directory: ${{ env.WORKING_DIR }}
        run: eas update --branch ${{ github.ref_name == 'main' && 'preview' || 'development' }} --message "$(git log -1 --pretty=%s)" --non-interactive --environment ${{ github.ref_name == 'main' && 'preview' || 'development' }}

  # Full native build (manual trigger)
  build:
    if: false # DISABLED
    name: Build (${{ inputs.profile }}, ${{ inputs.platform }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.profile == 'production' && 'production' || inputs.profile == 'development' && 'development' || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        working-directory: ${{ env.WORKING_DIR }}
        run: eas build --profile ${{ inputs.profile }} --platform ${{ inputs.platform }} --non-interactive

      - name: Submit to app stores
        if: inputs.submit && inputs.profile == 'production'
        working-directory: ${{ env.WORKING_DIR }}
        run: eas submit --profile production --platform ${{ inputs.platform }} --non-interactive
