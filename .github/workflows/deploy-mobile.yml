name: Deploy Mobile

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform"
        required: true
        type: choice
        options:
          - all
          - ios
          - android
      profile:
        description: "EAS build profile"
        required: true
        type: choice
        options:
          - preview
          - production
      submit:
        description: "Submit to app stores after build"
        required: false
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"

permissions:
  contents: read

env:
  WORKING_DIR: apps/mobile

jobs:
  # OTA update on push to main (fast — no native build)
  ota-update:
    name: OTA Update (preview)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish OTA update
        working-directory: ${{ env.WORKING_DIR }}
        run: eas update --branch preview --message "$(git log -1 --pretty=%s)"

  # Full native build (manual trigger)
  build:
    name: Build (${{ inputs.profile }}, ${{ inputs.platform }})
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ inputs.profile == 'production' && 'production' || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        working-directory: ${{ env.WORKING_DIR }}
        run: eas build --profile ${{ inputs.profile }} --platform ${{ inputs.platform }} --non-interactive

      - name: Submit to app stores
        if: inputs.submit && inputs.profile == 'production'
        working-directory: ${{ env.WORKING_DIR }}
        run: eas submit --profile production --platform ${{ inputs.platform }} --non-interactive
