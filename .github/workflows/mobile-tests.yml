name: Mobile Tests

on:
  workflow_dispatch:
  push:
    branches: [main, dev]
    paths:
      - "apps/mobile/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/mobile-tests.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "apps/mobile/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/mobile-tests.yml"

permissions:
  contents: read

concurrency:
  group: mobile-tests-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create mobile test env
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$EXPO_PUBLIC_SUPABASE_URL" ] || [ -z "$EXPO_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "Missing required GitHub Actions secrets: EXPO_PUBLIC_SUPABASE_URL and/or EXPO_PUBLIC_SUPABASE_ANON_KEY." >&2
            exit 1
          fi

          {
            printf 'EXPO_PUBLIC_SUPABASE_URL=%s\n' "$EXPO_PUBLIC_SUPABASE_URL"
            printf 'EXPO_PUBLIC_SUPABASE_ANON_KEY=%s\n' "$EXPO_PUBLIC_SUPABASE_ANON_KEY"
          } > .env.local

      - name: Run tests with coverage
        working-directory: apps/mobile
        run: pnpm test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: apps/mobile/coverage
          retention-days: 14
          if-no-files-found: ignore
