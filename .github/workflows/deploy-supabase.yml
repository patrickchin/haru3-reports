name: Deploy Supabase

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/functions/**"
      - "supabase/config.toml"

permissions:
  contents: read

env:
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'staging' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}

    env:
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Push database migrations
        run: supabase db push

      - name: Deploy edge functions
        run: |
          supabase functions deploy generate-report --no-verify-jwt
          supabase functions deploy admin-users
          supabase functions deploy admin-orgs
          supabase functions deploy admin-reports
          supabase functions deploy admin-analytics
          supabase functions deploy admin-audit

      - name: Set edge function secrets
        if: github.event.inputs.environment == 'production' || github.ref == 'refs/heads/main'
        run: |
          supabase secrets set \
            AI_PROVIDER="${{ vars.AI_PROVIDER }}" \
            OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            GOOGLE_AI_API_KEY="${{ secrets.GOOGLE_AI_API_KEY }}" \
            MOONSHOT_API_KEY="${{ secrets.MOONSHOT_API_KEY }}"
