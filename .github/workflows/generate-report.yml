name: Generate Report Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/functions/generate-report/**"
  pull_request:
    branches: [main]
    paths:
      - "supabase/functions/generate-report/**"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: deno-${{ runner.os }}-${{ hashFiles('deno.lock') }}
          restore-keys: deno-${{ runner.os }}-

      - name: Install dependencies
        run: deno install

      - name: Run unit tests
        run: |
          deno test --allow-env --allow-read \
            supabase/functions/generate-report/index.test.ts
