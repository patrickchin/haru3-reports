name: EAS Update (OTA)

on:
  workflow_dispatch:
  workflow_run:
    # Only chain off "Mobile Tests" — it already has the correct path filters
    # (apps/mobile/**, packages/**, pnpm-lock.yaml). Triggering off "CI" too
    # would publish two OTA updates per merge to dev.
    workflows: ["Mobile Tests"]
    types: [completed]
    branches: [main, dev]

permissions:
  contents: read

env:
  WORKING_DIR: apps/mobile

concurrency:
  group: eas-update-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: false

jobs:
  eas-update:
    name: Publish OTA Update
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only publish if the upstream workflow succeeded (workflow_run case),
    # or for manual dispatch.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    environment: ${{ (github.event.workflow_run.head_branch || github.ref_name) == 'main' && 'staging' || 'development' }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve branch context
        id: ctx
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch || github.ref_name }}"
          if [ "$BRANCH" = "main" ]; then
            echo "eas_branch=preview"  >> "$GITHUB_OUTPUT"
            echo "eas_env=production"  >> "$GITHUB_OUTPUT"
          else
            echo "eas_branch=development" >> "$GITHUB_OUTPUT"
            echo "eas_env=development"    >> "$GITHUB_OUTPUT"
          fi

      - name: Publish OTA update
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          SHORT_SHA="$(git rev-parse --short=7 HEAD)"
          SUBJECT="$(git log -1 --pretty=%s)"
          eas update \
            --branch "${{ steps.ctx.outputs.eas_branch }}" \
            --message "${SHORT_SHA} ${SUBJECT}" \
            --non-interactive \
            --environment "${{ steps.ctx.outputs.eas_env }}"
