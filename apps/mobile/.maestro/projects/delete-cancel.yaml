# Projects: Delete dialog cancel preserves project
appId: com.harpa.pro
tags:
  - projects
  - negative
env:
  PROJECT_NAME: "No Delete"
  PROJECT_ADDRESS: "444 Keep St"
  CLIENT_NAME: "Keep Client"
---
- runFlow: ../subflows/signup-or-login-mike.yaml
- runFlow:
    file: ../subflows/create-project.yaml
    env:
      PROJECT_NAME: "${PROJECT_NAME}"
      PROJECT_ADDRESS: "${PROJECT_ADDRESS}"
      CLIENT_NAME: "${CLIENT_NAME}"

- tapOn:
    id: "project-row-0"
- waitForAnimationToEnd

- tapOn:
    id: "btn-edit-project"
- waitForAnimationToEnd
- tapOn:
    id: "btn-delete-project"
- waitForAnimationToEnd

# Cancel the delete dialog
- extendedWaitUntil:
    visible:
      id: "dialog-sheet"
    timeout: 5000
- tapOn:
    id: "dialog-action-1"
- waitForAnimationToEnd

# Should still be on edit screen
- assertVisible: "${PROJECT_NAME}"

# Go back and clean up
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- runFlow: ../subflows/delete-current-project.yaml
