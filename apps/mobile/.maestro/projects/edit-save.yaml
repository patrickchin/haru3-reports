# Projects: Edit and save project
appId: com.harpa.pro
tags:
  - projects
  - positive
env:
  PROJECT_NAME: "Edit Original"
  PROJECT_ADDRESS: "111 Edit St"
  CLIENT_NAME: "Edit Client"
---
- runFlow: ../subflows/signup-or-login-mike.yaml
- runFlow:
    file: ../subflows/create-project.yaml
    env:
      PROJECT_NAME: "${PROJECT_NAME}"
      PROJECT_ADDRESS: "${PROJECT_ADDRESS}"
      CLIENT_NAME: "${CLIENT_NAME}"

- tapOn: "${PROJECT_NAME}"
- waitForAnimationToEnd

- tapOn:
    id: "btn-edit-project"
- waitForAnimationToEnd

# Clear and change the project name
- tapOn: "Project Name"
- clearText
- inputText: "Edit Updated"
- tapOn:
    point: "50%,25%"

- tapOn: "Save"
- extendedWaitUntil:
    visible: "Edit Updated"
    timeout: 3000

# Clean up
- runFlow: ../subflows/delete-current-project.yaml
