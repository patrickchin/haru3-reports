# PDF In-App View (smoke).
#
# Verifies that finalised reports render their PDF inside the app on both
# iOS and Android.
#
# This flow assumes there is at least one finalised report under Mike's
# first project. The report-create-and-delete flow can be run first to
# guarantee one exists; here we just open the most-recent report.
appId: com.harpa.pro
tags:
  - files
  - pdf
  - smoke
---
- runFlow: subflows/open-highland-project.yaml

# --- Open the reports list ---
- tapOn:
    id: "btn-open-reports"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "report-row-0"
    timeout: 30000

# --- Open the most-recent report ---
- tapOn:
    id: "report-row-0"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "btn-report-actions"
    timeout: 30000

# --- Open the actions menu and view PDF ---
- tapOn:
    id: "btn-report-actions"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "btn-report-view-pdf"
    timeout: 10000
- tapOn:
    id: "btn-report-view-pdf"

# --- The in-app PDF viewer should appear; wait for the PDF to finish
#     generating (can take a few seconds for large reports). ---
- extendedWaitUntil:
    visible:
      id: "pdf-preview"
    timeout: 60000

# --- Close the modal cleanly. ---
- tapOn: "Close"
- waitForAnimationToEnd
