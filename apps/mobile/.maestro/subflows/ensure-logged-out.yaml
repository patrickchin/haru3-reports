# Shared subflow: ensure a clean, logged-out app state on the login screen.
#
# Works against both Release (preview) builds and Debug (dev-client) builds.
# Zero-seed DB: the login screen shows Phone Number input (Demo Accounts row
# still renders on dev builds but demo-login will fail without seeded auth users,
# so flows always use the phone-OTP path).
appId: com.harpa.pro
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Dismiss the expo-dev-client launcher if present (Debug builds only).
- runFlow:
    when:
      visible: "Development Build"
    commands:
      - tapOn:
          text: "Harpa Pro"
          index: 1
      - waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "btn-open-profile"
    timeout: 5000
    optional: true

# Some preview builds reopen into an existing authenticated session even after
# launchApp(clearState). If that happens, sign out before continuing.
- runFlow:
    when:
      visible:
        id: "btn-open-profile"
    commands:
      - tapOn:
          id: "btn-open-profile"
      - waitForAnimationToEnd
      - scrollUntilVisible:
          element:
            text: "Sign Out"
          direction: DOWN
          speed: 40
          timeout: 5000
      - tapOn: "Sign Out"
      - waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Phone Number"
    timeout: 8000
