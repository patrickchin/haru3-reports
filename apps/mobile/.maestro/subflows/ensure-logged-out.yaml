# Shared subflow: ensure a clean, logged-out app state on the login screen.
#
# With a Release (preview) build there is no expo-dev-client launcher or dev
# menu to dismiss, so this is just: clearState, launch, wait for login screen.
appId: com.harpa.pro
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Demo Accounts"
    timeout: 15000
