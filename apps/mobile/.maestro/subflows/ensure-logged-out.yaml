# Shared subflow: ensure a clean, logged-out app state on the login screen.
#
# Works against both Release (preview) builds and Debug (dev-client) builds:
# on Debug, `clearState: true` drops us at the expo-dev-client launcher, so we
# tap the discovered "Harpa Pro" Metro entry first. On Release builds that row
# never appears and the optional tap is a no-op.
appId: com.harpa.pro
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Dismiss the expo-dev-client launcher if it's the foreground screen
# (only on Debug builds; release builds skip this branch entirely).
- runFlow:
    when:
      visible: "Development Build"
    commands:
      - tapOn:
          text: "Harpa Pro"
          index: 1
      - waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Demo Accounts"
    timeout: 30000
