# Shared subflow: ensure a clean, logged-out app state on the login screen.
#
# Works against both Release (preview) builds and Debug (dev-client) builds.
# Zero-seed DB: the login screen shows Phone Number input (Demo Accounts row
# still renders on dev builds but demo-login will fail without seeded auth users,
# so flows always use the phone-OTP path).
appId: com.harpa.pro
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Dismiss the expo-dev-client launcher if present (Debug builds only).
- runFlow:
    when:
      visible: "Development Build"
    commands:
      - tapOn:
          text: "Harpa Pro"
          index: 1
      - waitForAnimationToEnd

# Some preview launches stall on a blank shell before React mounts. A second
# cold launch is cheap and has been the most reliable way to reach a real UI.
- launchApp:
    clearState: true
- waitForAnimationToEnd

- runFlow:
    when:
      visible: "Development Build"
    commands:
      - tapOn:
          text: "Harpa Pro"
          index: 1
      - waitForAnimationToEnd

# Some preview launches still stall on a blank shell after repeated cold
# starts. A process-death relaunch exercises a different startup path and has
# been more reliable than stacking more clearState launches.
- killApp
- launchApp:
    appId: com.harpa.pro
    stopApp: false
- waitForAnimationToEnd

- runFlow:
    when:
      visible: "Development Build"
    commands:
      - tapOn:
          text: "Harpa Pro"
          index: 1
      - waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "input-phone"
    timeout: 5000
    optional: true

- extendedWaitUntil:
    visible:
      id: "btn-open-profile"
    timeout: 15000
    optional: true

# Some preview builds reopen into an existing authenticated session even after
# launchApp(clearState). If that happens, sign out before continuing.
- runFlow:
    when:
      visible:
        id: "btn-open-profile"
    commands:
      - tapOn:
          id: "btn-open-profile"
      - waitForAnimationToEnd
      - scrollUntilVisible:
          element:
            id: "btn-sign-out"
          direction: DOWN
          speed: 40
          timeout: 5000
      - tapOn:
          id: "btn-sign-out"
      - waitForAnimationToEnd

- waitForAnimationToEnd

# Auth can resolve after the login screen briefly appears on cold launch.
# Recheck for a late project-screen redirect before continuing with phone OTP.
- extendedWaitUntil:
    visible:
      id: "btn-open-profile"
    timeout: 8000
    optional: true

- runFlow:
    when:
      visible:
        id: "btn-open-profile"
    commands:
      - tapOn:
          id: "btn-open-profile"
      - waitForAnimationToEnd
      - scrollUntilVisible:
          element:
            id: "btn-sign-out"
          direction: DOWN
          speed: 40
          timeout: 5000
      - tapOn:
          id: "btn-sign-out"
      - waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "input-phone"
    timeout: 15000
