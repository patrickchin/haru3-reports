# Shared subflow: create a project from the projects list.
# Expects the user to already be on the Projects screen.
# Uses env vars: PROJECT_NAME, PROJECT_ADDRESS, CLIENT_NAME
# Falls back to defaults if not set.
appId: com.harpa.pro
---
- tapOn:
    id: "btn-new-project"
- waitForAnimationToEnd
- assertVisible: "New Project"

- tapOn:
    id: "input-project-name"
- inputText: "${PROJECT_NAME}"
- tapOn:
    id: "input-project-address"
- inputText: "${PROJECT_ADDRESS}"
- tapOn:
    id: "input-client-name"
- inputText: "${CLIENT_NAME}"
- scrollUntilVisible:
    element:
      text: "Create Project"
    direction: DOWN
    timeout: 3000
- tapOn: "Create Project"

- extendedWaitUntil:
    visible: "Projects"
    timeout: 3000
- extendedWaitUntil:
    visible:
      id: "project-row-0"
    timeout: 3000
