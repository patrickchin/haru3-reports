# Create Project: Validation Error (empty name)
appId: com.harpa.pro
tags:
  - projects
  - validation
---
- runFlow: subflows/ensure-logged-in-mike.yaml

- tapOn:
    id: "btn-new-project"
- waitForAnimationToEnd
- assertVisible: "New Project"

- tapOn: "Create Project"
- assertVisible: "Project name is required."

- tapOn:
    id: "btn-back"
- assertVisible: "Projects"
