# Reports List: Verify site-level reports and actions render
appId: com.harpa.pro
tags:
  - reports
  - smoke
---
- runFlow: subflows/ensure-logged-in-mike.yaml

- extendedWaitUntil:
    visible:
      id: "project-row-0"
    timeout: 30000
- tapOn:
    id: "project-row-0"
- waitForAnimationToEnd

- assertVisible: "Highland Tower Complex"
- assertVisible: "Total reports"
- tapOn:
    id: "btn-open-reports"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "report-row-draft-0"
    timeout: 20000
