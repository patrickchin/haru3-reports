# Reports List: Verify project-level reports and actions render
appId: com.harpa.pro
tags:
  - reports
  - smoke
---
- runFlow: subflows/open-highland-project.yaml

- assertVisible: "Total reports"
- tapOn:
    id: "btn-open-reports"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "report-row-draft-0"
    timeout: 20000
- assertVisible:
    id: "btn-new-report"
