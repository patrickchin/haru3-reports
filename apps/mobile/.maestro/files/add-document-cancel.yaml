# Files: Add document → cancel picker
# SKIPPED: No files screen exists yet — Documents card is "coming soon"
appId: com.harpa.pro
tags:
  - files
  - positive
  - wip
env:
  PROJECT_NAME: "Doc Upload"
  PROJECT_ADDRESS: "400 File St"
  CLIENT_NAME: "File Client"
---
- runFlow: ../subflows/signup-or-login-mike.yaml
- runFlow:
    file: ../subflows/create-project.yaml
    env:
      PROJECT_NAME: "${PROJECT_NAME}"
      PROJECT_ADDRESS: "${PROJECT_ADDRESS}"
      CLIENT_NAME: "${CLIENT_NAME}"

- tapOn:
    id: "project-row-0"
- waitForAnimationToEnd

- tapOn:
    id: "btn-open-files"
    optional: true
- waitForAnimationToEnd

# Tap add document
- tapOn:
    id: "btn-add-document"
    optional: true
- waitForAnimationToEnd

# Cancel the document picker (system UI)
- tapOn:
    text: "Cancel"
    optional: true

# Go back and clean up
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- runFlow: ../subflows/delete-current-project.yaml
