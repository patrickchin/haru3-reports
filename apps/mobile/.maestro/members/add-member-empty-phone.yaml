# Members: Add member with empty phone → validation
appId: com.harpa.pro
tags:
  - members
  - negative
env:
  PROJECT_NAME: "Empty Phone"
  PROJECT_ADDRESS: "777 Empty St"
  CLIENT_NAME: "Empty Client"
---
- runFlow: ../subflows/signup-or-login-mike.yaml
- runFlow:
    file: ../subflows/create-project.yaml
    env:
      PROJECT_NAME: "${PROJECT_NAME}"
      PROJECT_ADDRESS: "${PROJECT_ADDRESS}"
      CLIENT_NAME: "${CLIENT_NAME}"

- tapOn:
    id: "project-row-0"
- waitForAnimationToEnd

- tapOn:
    id: "btn-open-members"
- waitForAnimationToEnd

- tapOn:
    id: "btn-add-member"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Phone number"
    timeout: 5000

# Submit without phone
- tapOn:
    id: "btn-submit-member"
- assertVisible: ".*enter a phone number.*"

# Close modal and clean up (members → project detail)
- tapOn: "Cancel"
- waitForAnimationToEnd
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- runFlow: ../subflows/delete-current-project.yaml
