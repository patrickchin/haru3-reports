# Members: Add member with invalid phone → validation
appId: com.harpa.pro
tags:
  - members
  - negative
env:
  PROJECT_NAME: "Invalid Phone M"
  PROJECT_ADDRESS: "888 Bad St"
  CLIENT_NAME: "Bad Client"
---
- runFlow: ../subflows/signup-or-login-mike.yaml
- runFlow:
    file: ../subflows/create-project.yaml
    env:
      PROJECT_NAME: "${PROJECT_NAME}"
      PROJECT_ADDRESS: "${PROJECT_ADDRESS}"
      CLIENT_NAME: "${CLIENT_NAME}"

- tapOn: "${PROJECT_NAME}"
- waitForAnimationToEnd

- tapOn:
    id: "btn-open-members"
- waitForAnimationToEnd

- tapOn:
    id: "btn-add-member"
- waitForAnimationToEnd

# Enter invalid phone
- tapOn: "Phone Number"
- inputText: "abc123"
- tapOn:
    point: "50%,25%"
- tapOn: "Add Member"
- assertVisible: "valid phone"

# Go back and clean up
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- runFlow: ../subflows/delete-current-project.yaml
