# Report Draft Resume: Tapping a draft row routes to the generate screen
appId: com.harpa.pro
tags:
  - reports
  - draft
---
- runFlow: subflows/open-highland-site.yaml

- tapOn:
    id: "btn-open-reports"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "report-row-draft-0"
    timeout: 20000
- tapOn:
    id: "report-row-draft-0"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "New Report"
    timeout: 15000
- assertVisible:
    id: "btn-tab-notes"
- assertVisible:
    id: "btn-tab-report"
- assertVisible:
    id: "input-note"
