# Report Actions Menu: Open the Actions sheet on a finalized report
appId: com.harpa.pro
tags:
  - reports
  - actions
---
- runFlow: subflows/open-highland-project.yaml

- tapOn:
    id: "btn-open-reports"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "report-row-final-1"
    timeout: 20000
- tapOn:
    id: "report-row-final-1"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "btn-report-actions"
    timeout: 15000
- tapOn:
    id: "btn-report-actions"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "btn-report-view-pdf"
    timeout: 15000
- assertVisible:
    id: "btn-report-save-pdf"
- assertVisible:
    id: "btn-report-share-pdf"
- assertVisible:
    id: "btn-report-delete"
