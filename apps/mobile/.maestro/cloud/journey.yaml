# Full-app journey: one flow covering auth, projects, reports, profile.
#
# Structured as a linear user trip:
#   1. Logged-out shell (signup screen)
#   2. Phone OTP login
#   3. Reset + demo login as Mike Torres
#   4. Projects list + create validation
#   5. Highland project → overview, members, edit
#   6. Reports list → draft resume, finalized detail, actions menu
#   7. Create + finalize a new report (real LLM call), then delete it
#   8. Profile → account details → usage
#   9. Sign out
#
# Kept as a single flow to minimise Maestro Cloud quota usage.
# WARNING: section 13 spends a real LLM call (~10-30s, small per-run cost).
appId: com.harpa.pro
tags:
  - journey
  - cloud
---
# --- 1. Logged-out shell ---
- launchApp:
    clearState: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Demo Accounts"
    timeout: 15000

# --- 2. Signup screen ---
- tapOn:
    id: "link-signup"
- waitForAnimationToEnd
- assertVisible: "Create Account"
- assertVisible: "About you"
- assertVisible: "Phone"
- assertVisible: "Verify"
- assertVisible: "Full Name"
- assertVisible: "Company Name"
- assertVisible: "Continue"
- tapOn: "Back to Sign In"
- waitForAnimationToEnd
- assertVisible: "Demo Accounts"

# --- 3. Phone OTP login (test number) ---
- tapOn:
    id: "input-phone"
- inputText: "+15551234567"
- tapOn:
    point: "50%,25%"
- tapOn: "Send Code"
- extendedWaitUntil:
    visible:
      id: "input-otp"
    timeout: 15000
- tapOn:
    id: "input-otp"
- inputText: "888888"
- tapOn:
    point: "50%,25%"
- tapOn: "Verify Code"
- extendedWaitUntil:
    visible: "Get Started"
    timeout: 20000

# --- 4. Reset and demo-login as Mike ---
- launchApp:
    clearState: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Demo Accounts"
    timeout: 15000
- tapOn:
    id: "demo-user-0"
- extendedWaitUntil:
    visible: "Projects"
    timeout: 10000

# --- 5. Projects list ---
- extendedWaitUntil:
    visible:
      id: "project-row-0"
    timeout: 30000
- assertVisible:
    id: "project-row-1"
- assertVisible:
    id: "btn-new-project"

# --- 6. Create-project validation ---
- tapOn:
    id: "btn-new-project"
- waitForAnimationToEnd
- assertVisible: "New Project"
- tapOn: "Create Project"
- assertVisible: "Project name is required."
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- assertVisible: "Projects"

# --- 7. Open Highland Tower Complex ---
- extendedWaitUntil:
    visible: ".*Highland Tower Complex.*"
    timeout: 15000
- tapOn: ".*Highland Tower Complex.*"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Total reports"
    timeout: 30000
- assertVisible: ".*Highland Tower Complex.*"
- assertVisible: "Total reports"
- assertVisible: "Drafts"
- assertVisible: "Last report"
- assertVisible: "Reports"
- assertVisible: "Members"
- assertVisible: "Documents"
- assertVisible: "Materials & Equipment"
- assertVisible:
    id: "btn-edit-project"
- assertVisible:
    id: "btn-open-reports"
- assertVisible:
    id: "btn-open-members"

# --- 8. Members screen ---
- tapOn:
    id: "btn-open-members"
- waitForAnimationToEnd
- assertVisible: "Members"
- extendedWaitUntil:
    visible: "Mike Torres"
    timeout: 15000
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- assertVisible: "Highland Tower Complex"

# --- 9. Edit-project screen (read-only nav) ---
- tapOn:
    id: "btn-edit-project"
- waitForAnimationToEnd
- assertVisible: "Edit Project"
- assertVisible: "Project Name"
- assertVisible: "Project Address"
- assertVisible: "Client Name"
- assertVisible:
    id: "btn-save-project"
- assertVisible:
    id: "btn-delete-project"
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- assertVisible: "Highland Tower Complex"
- assertVisible: "Total reports"

# --- 10. Reports list ---
- tapOn:
    id: "btn-open-reports"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "report-row-draft-0"
    timeout: 20000
- assertVisible:
    id: "btn-new-report"

# --- 11. Draft resume ---
- tapOn:
    id: "report-row-draft-0"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "New Report"
    timeout: 15000
- assertVisible:
    id: "btn-tab-notes"
- assertVisible:
    id: "btn-tab-report"
- assertVisible:
    id: "input-note"
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd

# --- 12. Create, finalize, and delete a fresh report (real LLM call) ---
# Uses a typed note rich enough to populate weather, workers, materials, and
# issues. We delete only the report we just created — seeded fixtures stay.
- extendedWaitUntil:
    visible:
      id: "btn-new-report"
    timeout: 20000
- tapOn:
    id: "btn-new-report"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "New Report"
    timeout: 15000
- tapOn:
    id: "input-note"
- inputText: "Site visit on 26 April. Sunny, light breeze, around 24 degrees. Eight carpenters and two electricians on site, roughly 80 hours total. Delivered 2 tonnes of N12 reinforcement bar in good condition. Issue: scaffolding on the north face is missing toe-boards, medium severity, action required before next pour."
- tapOn:
    id: "btn-add-note"
- waitForAnimationToEnd
- tapOn:
    id: "btn-tab-report"
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "Type a quick site note"
    commands:
      - tapOn: "Report"
- waitForAnimationToEnd
# Surface report-generation failures explicitly. If the edge function returns
# a payload the mobile normalizer rejects, the UI shows a red error banner —
# fail fast with a clear message instead of timing out on btn-finalize-report.
- assertNotVisible: "Unexpected response format.*"
- assertNotVisible: "Edge function.*"
- extendedWaitUntil:
    visible:
      id: "btn-finalize-report"
    timeout: 180000
- tapOn:
    id: "btn-finalize-report"
- extendedWaitUntil:
    visible:
      id: "btn-report-actions"
    timeout: 30000
- assertVisible: "Summary"
- tapOn:
    id: "btn-report-actions"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "btn-report-delete"
    timeout: 15000
- tapOn:
    id: "btn-report-delete"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Delete Report"
    timeout: 10000
- tapOn: "Delete"
- extendedWaitUntil:
    visible:
      id: "btn-new-report"
    timeout: 20000

# --- 13. Finalized report detail + actions menu (seeded fixture) ---
- extendedWaitUntil:
    visible:
      id: "report-row-final-1"
    timeout: 20000
- tapOn:
    id: "report-row-final-1"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Issues"
    timeout: 15000
- assertVisible: "Summary"
- assertVisible: "Site Visit"
- extendedWaitUntil:
    visible:
      id: "btn-report-actions"
    timeout: 15000
- tapOn:
    id: "btn-report-actions"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "btn-report-view-pdf"
    timeout: 15000
- assertVisible:
    id: "btn-report-save-pdf"
- assertVisible:
    id: "btn-report-share-pdf"
- assertVisible:
    id: "btn-report-delete"
# Dismiss modal and back out to Projects
- tapOn:
    point: "50%,10%"
- waitForAnimationToEnd
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- assertVisible: "Projects"

# --- 14. Profile → content ---
- tapOn:
    id: "btn-open-profile"
- waitForAnimationToEnd
- assertVisible: "Mike Torres"
- assertVisible: "Torres Construction LLC"
- assertVisible: "Account Details"
- assertVisible: "Notifications"
- assertVisible: "Offline Data"
- assertVisible:
    id: "btn-sign-out"

# --- 15. Account Details ---
- tapOn: "Account Details"
- waitForAnimationToEnd
- assertVisible: "Account Details"
- assertVisible: "Phone"
- assertVisible: "Full Name"
- assertVisible: "Company Name"
- assertVisible: "Mike Torres"
- assertVisible: "Torres Construction LLC"
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- assertVisible: "Notifications"

# --- 16. Usage history ---
- extendedWaitUntil:
    visible:
      id: "btn-open-usage"
    timeout: 15000
- tapOn:
    id: "btn-open-usage"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Usage History"
    timeout: 10000
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- assertVisible:
    id: "btn-open-usage"

# --- 17. Sign out ---
- scrollUntilVisible:
    element:
      id: "btn-sign-out"
    direction: DOWN
- tapOn:
    id: "btn-sign-out"
- extendedWaitUntil:
    visible: "Demo Accounts"
    timeout: 10000
