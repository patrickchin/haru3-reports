# Profile Screen: Verify User Info and Sections
appId: com.harpa.pro
tags:
  - profile
---
- runFlow: subflows/ensure-logged-in-mike.yaml

- tapOn:
    id: "btn-open-profile"
- waitForAnimationToEnd

- assertVisible: "Mike Torres"
- assertVisible: "Torres Construction LLC"
- assertVisible: "Account Details"
- assertVisible: "Notifications"
- assertVisible: "Offline Data"
- assertVisible:
    id: "btn-sign-out"
