# Report Detail: Verify a finalized report surface renders key sections
appId: com.harpa.pro
tags:
  - reports
  - detail
---
- runFlow: subflows/ensure-logged-in-mike.yaml

- extendedWaitUntil:
    visible:
      id: "project-row-0"
    timeout: 30000
- tapOn:
    id: "project-row-0"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "btn-open-reports"
    timeout: 15000
- tapOn:
    id: "btn-open-reports"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "report-row-final-1"
    timeout: 20000
- tapOn:
    id: "report-row-final-1"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Issues"
    timeout: 15000
- assertVisible: "Summary"
- assertVisible: "Site Visit"
