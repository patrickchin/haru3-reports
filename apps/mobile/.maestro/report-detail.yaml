# Report Detail: Verify a finalized report surface renders key sections
appId: com.harpa.pro
tags:
  - reports
  - detail
---
- runFlow: subflows/open-highland-project.yaml

- tapOn:
    id: "btn-open-reports"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "report-row-final-1"
    timeout: 20000
- tapOn:
    id: "report-row-final-1"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Issues"
    timeout: 15000
- assertVisible: "Summary"
- assertVisible: "Site Visit"
- assertVisible:
    id: "btn-report-actions"
