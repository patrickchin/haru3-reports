# Create Project: Happy Path
appId: com.harpa.pro
tags:
  - smoke
  - projects
---
- runFlow: subflows/ensure-logged-in-mike.yaml

- tapOn:
    id: "btn-new-project"
- waitForAnimationToEnd
- assertVisible: "New Project"

- tapOn:
    id: "input-project-name"
- inputText: "Maestro Test Project"
- tapOn:
    id: "input-project-address"
- inputText: "123 Test Ave, Austin TX"
- tapOn:
    id: "input-client-name"
- inputText: "Test Construction Co."
- hideKeyboard
- tapOn: "Create Project"

- extendedWaitUntil:
    visible: "Projects"
    timeout: 20000
- extendedWaitUntil:
    visible: "Maestro Test Project"
    timeout: 15000
