# Profile → Usage History: Tap the Usage card and verify history screen
appId: com.harpa.pro
tags:
  - profile
  - usage
---
- runFlow: subflows/ensure-logged-in-mike.yaml

- tapOn:
    id: "btn-open-profile"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "btn-open-usage"
    timeout: 15000
- tapOn:
    id: "btn-open-usage"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Usage History"
    timeout: 10000

- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- assertVisible:
    id: "btn-open-usage"
