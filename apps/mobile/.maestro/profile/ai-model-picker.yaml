# Profile: AI model picker
appId: com.harpa.pro
tags:
  - profile
  - positive
---
- runFlow: ../subflows/signup-or-login-mike.yaml

- tapOn:
    id: "tab-profile"
- waitForAnimationToEnd

# Open AI model picker
- tapOn: "AI Model"
  optional: true
- waitForAnimationToEnd

# Verify model options
- assertVisible: "GPT"
  optional: true
- assertVisible: "Claude"
  optional: true

# Select a model and go back
- tapOn: "Claude"
  optional: true
- tapOn:
    id: "btn-back"
    optional: true
