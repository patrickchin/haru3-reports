# Profile: AI model picker
appId: com.harpa.pro
tags:
  - profile
  - positive
---
- runFlow: ../subflows/signup-or-login-mike.yaml

- tapOn:
    id: "btn-open-profile"
- waitForAnimationToEnd

# Open AI model picker
- tapOn:
    text: "AI Model"
    optional: true
- waitForAnimationToEnd

# Verify model options
- assertVisible:
    text: "GPT"
    optional: true
- assertVisible:
    text: "Claude"
    optional: true

# Select a model and go back
- tapOn:
    text: "Claude"
    optional: true
- tapOn:
    id: "btn-back"
    optional: true
