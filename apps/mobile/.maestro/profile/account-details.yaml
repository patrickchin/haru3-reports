# Profile: Account details screen
appId: com.harpa.pro
tags:
  - profile
  - positive
---
- runFlow: ../subflows/signup-or-login-mike.yaml

- tapOn:
    id: "tab-profile"
- waitForAnimationToEnd

- tapOn: "Account Details"
  optional: true
- waitForAnimationToEnd

# Verify account info
- assertVisible: "Mike Torres"
  optional: true
- assertVisible: "+15551234567"
  optional: true

# Go back
- tapOn:
    id: "btn-back"
    optional: true
