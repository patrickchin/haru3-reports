# Profile: A single back-button press from the profile screen returns to
# Projects. Regression for the long-running "needs to swipe back twice" bug,
# rooted in Profile being a member of the (tabs) Tabs navigator (singleton
# active-tab state shared across parent-stack entries). Profile is now a
# root-level Stack screen so push/pop are perfectly symmetric.
appId: com.harpa.pro
tags:
  - profile
  - positive
---
- runFlow: ../subflows/signup-or-login-mike.yaml

# Land on Projects after sign-in.
- assertVisible: "Projects"

# Open profile via the header action.
- tapOn:
    id: "btn-open-profile"
- waitForAnimationToEnd
- assertVisible: "Mike Torres"

# A SINGLE back press must return us to the Projects tab.
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- assertVisible: "Projects"
- assertNotVisible: "Mike Torres"
