# Profile: Usage section — after generating a report
appId: com.harpa.pro
tags:
  - profile
  - positive
env:
  PROJECT_NAME: "Usage Track"
  PROJECT_ADDRESS: "500 Usage St"
  CLIENT_NAME: "Usage Client"
---
- runFlow: ../subflows/signup-or-login-mike.yaml
- runFlow:
    file: ../subflows/create-project.yaml
    env:
      PROJECT_NAME: "${PROJECT_NAME}"
      PROJECT_ADDRESS: "${PROJECT_ADDRESS}"
      CLIENT_NAME: "${CLIENT_NAME}"

- tapOn: "${PROJECT_NAME}"
- waitForAnimationToEnd
- runFlow: ../subflows/create-draft-report.yaml

# Generate a report to create usage
- tapOn:
    id: "btn-add-note"
    optional: true
- tapOn:
    id: "input-note"
- inputText: "Usage tracking test"
- tapOn:
    point: "50%,25%"
- tapOn:
    id: "btn-generate-report"
- extendedWaitUntil:
    visible:
      id: "report-content"
    timeout: 5000

# Go to profile and check usage
- tapOn:
    id: "tab-profile"
- waitForAnimationToEnd
- tapOn: "Usage"
  optional: true
- waitForAnimationToEnd

# Should show some usage now (non-zero)
- assertNotVisible: "No usage data"
  optional: true

# Go back to projects tab to clean up
- tapOn:
    id: "tab-projects"
- waitForAnimationToEnd
- tapOn: "${PROJECT_NAME}"
- waitForAnimationToEnd
- runFlow: ../subflows/delete-current-project.yaml
