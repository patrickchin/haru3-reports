# Profile: Avatar upload → cancel
appId: com.harpa.pro
tags:
  - profile
  - positive
---
- runFlow: ../subflows/signup-or-login-mike.yaml

- tapOn:
    id: "btn-open-profile"
- waitForAnimationToEnd

# Tap avatar area
- tapOn:
    id: "btn-edit-avatar"
    optional: true
- waitForAnimationToEnd

# Cancel image picker
- tapOn:
    text: "Cancel"
    optional: true
