# Profile → Account Details: Verify read-only profile fields
appId: com.harpa.pro
tags:
  - profile
  - account
---
- runFlow: subflows/ensure-logged-in-mike.yaml

- tapOn:
    id: "btn-open-profile"
- waitForAnimationToEnd

- tapOn: "Account Details"
- waitForAnimationToEnd

- assertVisible: "Account Details"
- assertVisible: "Phone"
- assertVisible: "Full Name"
- assertVisible: "Company Name"
- assertVisible: "Mike Torres"
- assertVisible: "Torres Construction LLC"

- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- assertVisible: "Notifications"
