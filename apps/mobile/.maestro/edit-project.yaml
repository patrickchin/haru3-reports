# Edit Project: Verify edit screen pre-fills project details (read-only navigation check)
appId: com.harpa.pro
tags:
  - projects
  - edit
---
- runFlow: subflows/open-highland-project.yaml

- tapOn:
    id: "btn-edit-project"
- waitForAnimationToEnd
- assertVisible: "Edit Project"
- assertVisible: "Project Name"
- assertVisible: "Project Address"
- assertVisible: "Client Name"
- assertVisible:
    id: "btn-save-project"
- assertVisible:
    id: "btn-delete-project"

# Back to overview without mutating data
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- assertVisible: "Highland Tower Complex"
- assertVisible: "Total reports"
