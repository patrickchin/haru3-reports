# Signup: Back navigation through stepper
appId: com.harpa.pro
tags:
  - auth
  - positive
---
- runFlow: ../subflows/ensure-logged-out.yaml

- tapOn:
    id: "link-signup"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Create Account"
    timeout: 5000
- assertVisible: "Back to Sign In"

# Back to login from identity step
- tapOn: "Back to Sign In"
- waitForAnimationToEnd
- assertVisible: "Phone Number"

# Return to signup, fill identity, advance to phone step
- tapOn:
    id: "link-signup"
- waitForAnimationToEnd
- tapOn:
    id: "input-signup-name"
- inputText: "Nav Test"
- tapOn:
    id: "input-signup-company"
- inputText: "Nav Co"
- tapOn:
    point: "50%,25%"
- tapOn: "Continue"

- extendedWaitUntil:
    visible: "Phone Number"
    timeout: 5000

# Back from phone step → identity step
- tapOn: "Back"
- waitForAnimationToEnd
- assertVisible: "About you"

# Back to login from identity
- tapOn: "Back to Sign In"
- waitForAnimationToEnd
- assertVisible: "Phone Number"
