# Sign Out: Tap sign-out from profile and land on login
appId: com.harpa.pro
tags:
  - auth
  - positive
---
- runFlow: ../subflows/signup-or-login-mike.yaml

# Navigate to profile tab
- tapOn:
    id: "tab-profile"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Sign Out"
    timeout: 2000

- tapOn: "Sign Out"
- waitForAnimationToEnd

# Should land on login screen
- extendedWaitUntil:
    visible: "Phone Number"
    timeout: 3000
