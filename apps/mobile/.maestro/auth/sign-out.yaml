# Sign Out: Tap sign-out from profile and land on login
appId: com.harpa.pro
tags:
  - auth
  - positive
---
- runFlow: ../subflows/signup-or-login-mike.yaml

# Navigate to profile tab
- tapOn:
    id: "btn-open-profile"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "btn-sign-out"
    timeout: 5000

- tapOn:
    id: "btn-sign-out"
- waitForAnimationToEnd

# Should land on login screen
- extendedWaitUntil:
    visible: "Phone Number"
    timeout: 8000
