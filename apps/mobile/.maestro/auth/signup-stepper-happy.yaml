# Signup: Full 3-step stepper happy path
appId: com.harpa.pro
tags:
  - auth
  - positive
---
- runFlow: ../subflows/ensure-logged-out.yaml

- tapOn:
    id: "link-signup"
- waitForAnimationToEnd

- assertVisible: "Create Account"
- assertVisible: "About you"

# Step 1: Identity
- tapOn:
    id: "input-signup-name"
- inputText: "Signup Test User"
- tapOn:
    id: "input-signup-company"
- inputText: "Signup Test Co"
- tapOn:
    point: "50%,25%"
- tapOn: "Continue"

# Step 2: Phone
- extendedWaitUntil:
    visible: "Phone Number"
    timeout: 5000
- tapOn: "Phone Number"
- inputText: "+15559999999"
- tapOn:
    point: "50%,25%"
- tapOn: "Send Code"

# Step 3: Verify
- extendedWaitUntil:
    visible: "Code"
    timeout: 5000
- tapOn: "Code"
- inputText: "888888"
- tapOn:
    point: "50%,25%"
- tapOn:
    id: "btn-signup-verify"
- extendedWaitUntil:
    visible: "Projects"
    timeout: 8000
