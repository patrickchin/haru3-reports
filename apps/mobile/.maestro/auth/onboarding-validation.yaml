# Onboarding: Validation on company fields
# Uses Sarah (second user) so onboarding is triggered fresh
appId: com.harpa.pro
tags:
  - auth
  - negative
---
- runFlow: ../subflows/ensure-logged-out.yaml

# Login with a fresh number that will need onboarding
- tapOn:
    id: "input-phone"
- inputText: "+15550000003"
- tapOn:
    point: "50%,25%"
- tapOn: "Send Code"

- extendedWaitUntil:
    visible:
      id: "input-otp"
    timeout: 3000
- tapOn:
    id: "input-otp"
- inputText: "888888"
- tapOn:
    point: "50%,25%"
- tapOn: "Verify Code"

# Wait for onboarding screen
- extendedWaitUntil:
    visible: "Welcome"
    timeout: 3000

# Submit with empty fields → validation errors
- tapOn: "Continue"
- assertVisible: "name"
