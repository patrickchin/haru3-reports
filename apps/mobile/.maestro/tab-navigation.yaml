# Navigation: Open Profile from Sites, return via Back button
appId: com.harpa.pro
tags:
  - smoke
  - navigation
---
- runFlow: subflows/ensure-logged-in-mike.yaml

- assertVisible: "Sites"
- tapOn:
    id: "btn-open-profile"
- waitForAnimationToEnd
- assertVisible: "Account Details"

- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- assertVisible: "Sites"
