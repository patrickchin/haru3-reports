# Signup Screen: Verify the create-account stepper and fields render
appId: com.harpa.pro
tags:
  - auth
  - signup
---
- runFlow: subflows/ensure-logged-out.yaml

- tapOn:
    id: "link-signup"
- waitForAnimationToEnd

- assertVisible: "Create Account"
- assertVisible: "About you"
- assertVisible: "Phone"
- assertVisible: "Verify"
- assertVisible: "Full Name"
- assertVisible: "Company Name"
- assertVisible: "Continue"
