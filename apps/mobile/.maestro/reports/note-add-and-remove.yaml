# Reports: Add and remove notes
appId: com.harpa.pro
tags:
  - reports
  - positive
env:
  PROJECT_NAME: "Note CRUD"
  PROJECT_ADDRESS: "205 Rpt St"
  CLIENT_NAME: "Rpt Notes"
---
- runFlow: ../subflows/signup-or-login-mike.yaml
- runFlow:
    file: ../subflows/create-project.yaml
    env:
      PROJECT_NAME: "${PROJECT_NAME}"
      PROJECT_ADDRESS: "${PROJECT_ADDRESS}"
      CLIENT_NAME: "${CLIENT_NAME}"

- tapOn: "${PROJECT_NAME}"
- waitForAnimationToEnd
- runFlow: ../subflows/create-draft-report.yaml

# Add first note
- tapOn:
    id: "btn-add-note"
    optional: true
- tapOn:
    id: "input-note"
- inputText: "First note"
- tapOn:
    point: "50%,25%"

# Add second note
- tapOn:
    id: "btn-add-note"
    optional: true
- tapOn:
    id: "input-note"
- inputText: "Second note"
- tapOn:
    point: "50%,25%"

- assertVisible: "First note"
- assertVisible: "Second note"

# Remove first note
- tapOn:
    id: "btn-remove-note-0"
    optional: true

# Go back and clean up
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- runFlow: ../subflows/delete-current-project.yaml
