# Reports: Save/download PDF
appId: com.harpa.pro
tags:
  - reports
  - positive
env:
  PROJECT_NAME: "Save PDF"
  PROJECT_ADDRESS: "212 Rpt St"
  CLIENT_NAME: "Rpt Save"
---
- runFlow: ../subflows/signup-or-login-mike.yaml
- runFlow:
    file: ../subflows/create-project.yaml
    env:
      PROJECT_NAME: "${PROJECT_NAME}"
      PROJECT_ADDRESS: "${PROJECT_ADDRESS}"
      CLIENT_NAME: "${CLIENT_NAME}"

- tapOn: "${PROJECT_NAME}"
- waitForAnimationToEnd
- runFlow: ../subflows/create-draft-report.yaml

# Add note and generate
- tapOn:
    id: "btn-add-note"
    optional: true
- tapOn:
    id: "input-note"
- inputText: "Save PDF test"
- tapOn:
    point: "50%,25%"
- tapOn:
    id: "btn-generate-report"
- extendedWaitUntil:
    visible:
      id: "report-content"
    timeout: 5000

# Open actions → Download PDF
- tapOn:
    id: "btn-report-actions"
    optional: true
- waitForAnimationToEnd
- tapOn: "Download PDF"
  optional: true
- extendedWaitUntil:
    visible: "Saved"
    timeout: 8000
    optional: true

# Go back and clean up
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- runFlow: ../subflows/delete-current-project.yaml
