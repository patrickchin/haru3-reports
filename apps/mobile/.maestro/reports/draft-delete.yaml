# Reports: Delete a draft report
appId: com.harpa.pro
tags:
  - reports
  - positive
env:
  PROJECT_NAME: "Draft Delete"
  PROJECT_ADDRESS: "204 Rpt St"
  CLIENT_NAME: "Rpt Del"
---
- runFlow: ../subflows/signup-or-login-mike.yaml
- runFlow:
    file: ../subflows/create-project.yaml
    env:
      PROJECT_NAME: "${PROJECT_NAME}"
      PROJECT_ADDRESS: "${PROJECT_ADDRESS}"
      CLIENT_NAME: "${CLIENT_NAME}"

- tapOn:
    id: "project-row-0"
- waitForAnimationToEnd
- runFlow: ../subflows/create-draft-report.yaml

# Navigate back to report list with draft
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "report-row-draft-0"
    timeout: 5000

# Delete the draft via swipe or button
- tapOn:
    id: "btn-delete-report-0"
    optional: true
- extendedWaitUntil:
    visible: "Delete"
    timeout: 3000
    optional: true
- tapOn:
    text: "Delete"
    optional: true

# Go back and clean up (reports list → project detail)
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- runFlow: ../subflows/delete-current-project.yaml
