# Reports: Delete dialog cancel preserves report
appId: com.harpa.pro
tags:
  - reports
  - negative
env:
  PROJECT_NAME: "No Del Rpt"
  PROJECT_ADDRESS: "210 Rpt St"
  CLIENT_NAME: "Rpt No Del"
---
- runFlow: ../subflows/signup-or-login-mike.yaml
- runFlow:
    file: ../subflows/create-project.yaml
    env:
      PROJECT_NAME: "${PROJECT_NAME}"
      PROJECT_ADDRESS: "${PROJECT_ADDRESS}"
      CLIENT_NAME: "${CLIENT_NAME}"

- tapOn:
    id: "project-row-0"
- waitForAnimationToEnd
- runFlow: ../subflows/create-draft-report.yaml

# Add note and generate
- tapOn:
    id: "input-note"
- inputText: "Cancel delete test"
- tapOn:
    id: "btn-add-note"
- waitForAnimationToEnd
# Manually trigger report generation (also switches to Report tab)
- tapOn:
    id: "btn-generate-update-report"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "sunny"
    timeout: 15000
- runFlow: ../subflows/finalize-report.yaml

# Open actions → Delete → Cancel
- tapOn:
    id: "btn-report-actions"
- waitForAnimationToEnd
- tapOn:
    id: "btn-report-delete"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "dialog-sheet"
    timeout: 5000
# dialog-action-1 is the Cancel button (second action)
- tapOn:
    id: "dialog-action-1"
- waitForAnimationToEnd

# Report should still be visible
- assertVisible:
    id: "btn-report-actions"

# Go back and clean up (detail → reports list → project detail)
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- runFlow: ../subflows/delete-current-project.yaml
