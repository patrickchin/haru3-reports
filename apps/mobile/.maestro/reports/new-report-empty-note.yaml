# Reports: Generate with empty note → validation
appId: com.harpa.pro
tags:
  - reports
  - negative
env:
  PROJECT_NAME: "Empty Note"
  PROJECT_ADDRESS: "202 Rpt St"
  CLIENT_NAME: "Rpt Empty"
---
- runFlow: ../subflows/signup-or-login-mike.yaml
- runFlow:
    file: ../subflows/create-project.yaml
    env:
      PROJECT_NAME: "${PROJECT_NAME}"
      PROJECT_ADDRESS: "${PROJECT_ADDRESS}"
      CLIENT_NAME: "${CLIENT_NAME}"

- tapOn:
    id: "project-row-0"
- waitForAnimationToEnd
- runFlow: ../subflows/create-draft-report.yaml

# Switch to notes tab to see empty state
- tapOn:
    id: "btn-tab-notes"
- waitForAnimationToEnd

# Verify empty state — no notes yet
- extendedWaitUntil:
    visible: "Start capturing site notes"
    timeout: 5000

# Report tab should not have finalize button
- tapOn:
    id: "btn-tab-report"
- waitForAnimationToEnd
- assertNotVisible:
    id: "btn-finalize-report"

# Go back and clean up (generate → reports list → project detail)
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- runFlow: ../subflows/delete-current-project.yaml
