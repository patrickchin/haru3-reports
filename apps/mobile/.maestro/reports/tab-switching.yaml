# Reports: Tab switching on generated report
appId: com.harpa.pro
tags:
  - reports
  - positive
env:
  PROJECT_NAME: "Tab Switch"
  PROJECT_ADDRESS: "206 Rpt St"
  CLIENT_NAME: "Rpt Tabs"
---
- runFlow: ../subflows/signup-or-login-mike.yaml
- runFlow:
    file: ../subflows/create-project.yaml
    env:
      PROJECT_NAME: "${PROJECT_NAME}"
      PROJECT_ADDRESS: "${PROJECT_ADDRESS}"
      CLIENT_NAME: "${CLIENT_NAME}"

- tapOn:
    id: "project-row-0"
- waitForAnimationToEnd
- runFlow: ../subflows/create-draft-report.yaml

# Add note and generate
- tapOn:
    id: "input-note"
- inputText: "Tab test note"
- tapOn:
    id: "btn-add-note"
- waitForAnimationToEnd
- tapOn:
    id: "btn-tab-report"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "sunny"
    timeout: 15000
- scrollUntilVisible:
    element:
      id: "btn-finalize-report"
    direction: DOWN
    speed: 80
    timeout: 10000

# Switch back to notes tab and verify
- tapOn:
    id: "btn-tab-notes"
- waitForAnimationToEnd
- assertVisible: "Tab test note"

# Switch back to report tab
- tapOn:
    id: "btn-tab-report"
- waitForAnimationToEnd

# Go back and clean up
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- runFlow: ../subflows/delete-current-project.yaml
