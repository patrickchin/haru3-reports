# Reports: Tab switching on generated report
appId: com.harpa.pro
tags:
  - reports
  - positive
env:
  PROJECT_NAME: "Tab Switch"
  PROJECT_ADDRESS: "206 Rpt St"
  CLIENT_NAME: "Rpt Tabs"
---
- runFlow: ../subflows/signup-or-login-mike.yaml
- runFlow:
    file: ../subflows/create-project.yaml
    env:
      PROJECT_NAME: "${PROJECT_NAME}"
      PROJECT_ADDRESS: "${PROJECT_ADDRESS}"
      CLIENT_NAME: "${CLIENT_NAME}"

- tapOn: "${PROJECT_NAME}"
- waitForAnimationToEnd
- runFlow: ../subflows/create-draft-report.yaml

# Add note and generate
- tapOn:
    id: "btn-add-note"
    optional: true
- tapOn:
    id: "input-note"
- inputText: "Tab test note"
- tapOn:
    point: "50%,25%"
- tapOn:
    id: "btn-generate-report"
- extendedWaitUntil:
    visible:
      id: "report-content"
    timeout: 5000

# Switch between tabs
- tapOn: "Summary"
  optional: true
- tapOn: "Details"
  optional: true
- tapOn: "Notes"
  optional: true

# Go back and clean up
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- runFlow: ../subflows/delete-current-project.yaml
