# Reports: Actions menu — all buttons visible
appId: com.harpa.pro
tags:
  - reports
  - positive
env:
  PROJECT_NAME: "Actions Menu"
  PROJECT_ADDRESS: "208 Rpt St"
  CLIENT_NAME: "Rpt Actions"
---
- runFlow: ../subflows/signup-or-login-mike.yaml
- runFlow:
    file: ../subflows/create-project.yaml
    env:
      PROJECT_NAME: "${PROJECT_NAME}"
      PROJECT_ADDRESS: "${PROJECT_ADDRESS}"
      CLIENT_NAME: "${CLIENT_NAME}"

- tapOn:
    id: "project-row-0"
- waitForAnimationToEnd
- runFlow: ../subflows/create-draft-report.yaml

# Add note and generate
- tapOn:
    id: "input-note"
- inputText: "Actions test"
- tapOn:
    id: "btn-add-note"
- waitForAnimationToEnd
# Manually trigger report generation (also switches to Report tab)
- tapOn:
    id: "btn-generate-update-report"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "sunny"
    timeout: 15000
- runFlow: ../subflows/finalize-report.yaml

# Open actions menu
- tapOn:
    id: "btn-report-actions"
- waitForAnimationToEnd

# Verify action items
- assertVisible:
    id: "btn-report-view-pdf"
- assertVisible:
    id: "btn-report-save-pdf"
- assertVisible:
    id: "btn-report-share-pdf"
- assertVisible:
    id: "btn-report-delete"

# Close menu
- tapOn:
    point: "50%,25%"

# Go back and clean up (detail → reports list → project detail)
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- runFlow: ../subflows/delete-current-project.yaml
