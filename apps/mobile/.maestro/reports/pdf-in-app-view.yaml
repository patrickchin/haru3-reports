# Reports: View PDF in-app
appId: com.harpa.pro
tags:
  - reports
  - positive
env:
  PROJECT_NAME: "PDF View"
  PROJECT_ADDRESS: "211 Rpt St"
  CLIENT_NAME: "Rpt PDF"
---
- runFlow: ../subflows/signup-or-login-mike.yaml
- runFlow:
    file: ../subflows/create-project.yaml
    env:
      PROJECT_NAME: "${PROJECT_NAME}"
      PROJECT_ADDRESS: "${PROJECT_ADDRESS}"
      CLIENT_NAME: "${CLIENT_NAME}"

- tapOn: "${PROJECT_NAME}"
- waitForAnimationToEnd
- runFlow: ../subflows/create-draft-report.yaml

# Add note and generate
- tapOn:
    id: "btn-add-note"
    optional: true
- tapOn:
    id: "input-note"
- inputText: "PDF view test"
- tapOn:
    point: "50%,25%"
- tapOn:
    id: "btn-generate-report"
- extendedWaitUntil:
    visible:
      id: "report-content"
    timeout: 5000

# Open PDF viewer
- tapOn:
    id: "btn-view-pdf"
    optional: true
- extendedWaitUntil:
    visible:
      id: "pdf-viewer"
    timeout: 8000
    optional: true

# Close PDF viewer
- tapOn:
    id: "btn-close-pdf"
    optional: true
- tapOn:
    id: "btn-back"
    optional: true

# Go back and clean up
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- runFlow: ../subflows/delete-current-project.yaml
