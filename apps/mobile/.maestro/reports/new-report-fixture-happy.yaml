# Reports: New report with fixture LLM — happy path
appId: com.harpa.pro
tags:
  - reports
  - positive
  - smoke
env:
  PROJECT_NAME: "New Report"
  PROJECT_ADDRESS: "201 Rpt St"
  CLIENT_NAME: "Rpt Happy"
---
- runFlow: ../subflows/signup-or-login-mike.yaml
- runFlow:
    file: ../subflows/create-project.yaml
    env:
      PROJECT_NAME: "${PROJECT_NAME}"
      PROJECT_ADDRESS: "${PROJECT_ADDRESS}"
      CLIENT_NAME: "${CLIENT_NAME}"

- tapOn: "${PROJECT_NAME}"
- waitForAnimationToEnd
- runFlow: ../subflows/create-draft-report.yaml

# Add a note
- tapOn:
    id: "btn-add-note"
    optional: true
- tapOn:
    id: "input-note"
- inputText: "Foundation cracks on north wall"
- tapOn:
    point: "50%,25%"

# Generate
- tapOn:
    id: "btn-generate-report"
- extendedWaitUntil:
    visible: "Generating"
    timeout: 5000
    optional: true
- extendedWaitUntil:
    visible:
      id: "report-content"
    timeout: 5000

# Go back and clean up
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- runFlow: ../subflows/delete-current-project.yaml
