# Reports: New report with fixture LLM — happy path
appId: com.harpa.pro
tags:
  - reports
  - positive
  - smoke
env:
  PROJECT_NAME: "New Report"
  PROJECT_ADDRESS: "201 Rpt St"
  CLIENT_NAME: "Rpt Happy"
---
- runFlow: ../subflows/signup-or-login-mike.yaml
- runFlow:
    file: ../subflows/create-project.yaml
    env:
      PROJECT_NAME: "${PROJECT_NAME}"
      PROJECT_ADDRESS: "${PROJECT_ADDRESS}"
      CLIENT_NAME: "${CLIENT_NAME}"

- tapOn:
    id: "project-row-0"
- waitForAnimationToEnd
- runFlow: ../subflows/create-draft-report.yaml

# Add a note
- tapOn:
    id: "input-note"
- inputText: "Foundation cracks on north wall"
- tapOn:
    id: "btn-add-note"
- waitForAnimationToEnd

# Manually trigger report generation (also switches to Report tab)
- tapOn:
    id: "btn-generate-update-report"
- waitForAnimationToEnd
# Wait for report content to appear (fixture returns quickly)
- extendedWaitUntil:
    visible:
      text: "sunny"
    timeout: 15000
# Scroll down to find finalize button
- scrollUntilVisible:
    element:
      id: "btn-finalize-report"
    direction: DOWN
    speed: 80
    timeout: 10000

# Go back to project detail and clean up
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- tapOn:
    id: "btn-back"
- waitForAnimationToEnd
- runFlow: ../subflows/delete-current-project.yaml
