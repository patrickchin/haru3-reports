# Login Flow: Phone Number + OTP
# Note: requires dev/staging environment with OTP 000000
appId: com.harpa.pro
tags:
  - auth
---
- runFlow: subflows/ensure-logged-out.yaml

- tapOn:
    id: "input-phone"
- inputText: "+15551234567"
- tapOn:
    point: "50%,25%"
- tapOn: "Send Code"

- extendedWaitUntil:
    visible:
      id: "input-otp"
    timeout: 15000
- tapOn:
    id: "input-otp"
- inputText: "888888"
- tapOn:
    point: "50%,25%"
- tapOn: "Verify Code"

- extendedWaitUntil:
    visible: "Get Started"
    timeout: 20000
